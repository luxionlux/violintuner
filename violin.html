<!DOCTYPE html>
<html>

<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap');
    </style>

    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #Division1 {
            float: left;
            width: 35%;
            height: 100%;
            background-color: #CECED2;

        }

        #Division2 {
            float: left;
            width: 65%;
            height: 100%;
            background-image: url("violinbg.jpg");
            background-size: cover;
            background-repeat: no-repeat;
        }

        html,
        body,
        #Wrapper {
            height: 100%;
            width: 100%;
        }

        * {
            font-family: 'Playfair Display', serif;
        }

        #Frequency {
            font-size: x-large;
        }
    </style>

    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>

    <script>

        const A4 = 440
        const C0 = A4 * Math.pow(2, -4.75)

        const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"]


        let audioContext;
        let stream;
        let pitch;

        var pitchInterval;

        function freqtopitch(freq) {
            let h = Math.round(12 * Math.log2(freq / C0))
            let octave = Math.floor(h / 12);
            let n = h % 12
            return notes[n] + octave
        }


        async function setup() {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            startPitch(stream, audioContext);
        }

        function playAudioStream() {
            if (document.getElementById("play").innerText == "Start") {
                document.getElementById("play").innerText = "Stop";
                audioContext = new AudioContext();
                setup();

                pitchInterval = setInterval(() => {
                    document.getElementById('Frequency').innerText = getPitch();
                }, 20);
            } else {
                document.getElementById("play").innerText = "Start";
                clearInterval(pitchInterval);
            }
        }

        function startPitch(stream, audioContext) {
            pitch = ml5.pitchDetection('./model/', audioContext, stream, modelLoaded);
        }

        function modelLoaded() {
            document.getElementById('status').innerText = 'The tuner is ready to be used!';
            getPitch();
        }

        function getPitch() {
            pitch.getPitch(function (err, frequency) {
                if (frequency) {
                    document.getElementById('Frequency').innerHTML = freqtopitch(frequency);
                    console.log(frequency);
                    return frequency;
                } else {
                    document.getElementById('Frequency').innerHTML = "<br>";
                }
            })
        }

    </script>


</head>

<body>

    <div id="Wrapper">
        <div id="Division1">
            <div
                style="height: 35%; width: 80%; margin-left:auto; margin-right:auto; margin-top: 10%; border: #dbdfe7; border-style: solid; border-width: 6px; text-align: center; display: table ">
                <p
                    style="color: #080707; display: table-cell; vertical-align: middle; text-align: center; font-size: 40pt">
                    Violin Tuner
                </p>
            </div>
            <p style="margin-left: 5%; margin-right: 5%; text-align: center; font-size: 18pt">
                This free violin tuner uses your microphone to record the sound produced by your violin. It will tell
                you the note you're playing and the accuracy from said note, so you can tune your violin.
            </p>
        </div>
        <div id="Division2">
            <div id="Frequency"></div>
            <button id="play" onclick="playAudioStream()">Start</button>
            <div id="status"></div>
        </div>
    </div>



</body>



</html>
